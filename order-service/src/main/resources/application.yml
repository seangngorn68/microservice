server:
  port: 8083

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/microDB
    username: postgres
    password: 12345678

  jpa:
    hibernate:
      ddl-auto: update
      ##ddl-auto: create-drop

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8181/realms/microservices-realm
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        prefetch: 10
        concurrency: 3
        max-concurrency: 10
logging:
  level:
    org.springframework.amqp: DEBUG
    org.springframework.rabbit: DEBUG